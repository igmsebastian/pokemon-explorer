<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Pokemon Explorer</title>
    <script>
      (() => {
        const storageKey = "pokemon-explorer-theme"
        const mediaQuery = "(prefers-color-scheme: dark)"
        let mode = "dark"

        try {
          const storedTheme = window.localStorage.getItem(storageKey)
          const parsedTheme = storedTheme ? JSON.parse(storedTheme) : null
          const savedMode = parsedTheme?.state?.mode

          if (["light", "dark", "system"].includes(savedMode)) {
            mode = savedMode
          }
        } catch {
          mode = "dark"
        }

        const prefersDark = window.matchMedia(mediaQuery).matches
        const shouldUseDark =
          mode === "dark" || (mode === "system" && prefersDark)

        document.documentElement.classList.toggle("dark", shouldUseDark)
        document.documentElement.dataset.theme = mode
        document.documentElement.style.colorScheme = shouldUseDark
          ? "dark"
          : "light"
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
